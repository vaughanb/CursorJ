name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Build and test
        run: ./gradlew --no-daemon build

      - name: Verify plugin compatibility
        run: ./gradlew --no-daemon verifyPlugin

      - name: Build plugin distribution
        run: ./gradlew --no-daemon buildPlugin

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: cursorj-plugin-zip
          path: build/distributions/*.zip

      - name: Publish to JetBrains Marketplace
        env:
          ORG_GRADLE_PROJECT_intellijPlatformPublishingToken: ${{ secrets.JETBRAINS_MARKETPLACE_TOKEN }}
        run: ./gradlew --no-daemon publishPlugin
