name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show disk usage (before cleanup)
        run: df -h

      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /usr/local/.ghcup /opt/hostedtoolcache/CodeQL || true
          sudo docker system prune -af || true

      - name: Show disk usage (after cleanup)
        run: df -h

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Build and test
        run: ./gradlew --no-daemon build

      - name: Verify plugin compatibility
        run: ./gradlew --no-daemon verifyPlugin

      - name: Build plugin distribution
        run: ./gradlew --no-daemon buildPlugin

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: cursorj-plugin-zip
          path: build/distributions/*.zip

  publish:
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show disk usage (before cleanup)
        run: df -h

      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /usr/local/.ghcup /opt/hostedtoolcache/CodeQL || true
          sudo docker system prune -af || true

      - name: Show disk usage (after cleanup)
        run: df -h

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Verify marketplace token is present
        env:
          TOKEN: ${{ secrets.JETBRAINS_MARKETPLACE_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "JETBRAINS_MARKETPLACE_TOKEN is missing"
            exit 1
          fi

      - name: Publish to JetBrains Marketplace
        env:
          JETBRAINS_MARKETPLACE_TOKEN: ${{ secrets.JETBRAINS_MARKETPLACE_TOKEN }}
          JETBRAINS_MARKETPLACE_CHANNEL: beta
        run: ./gradlew --no-daemon publishPlugin
